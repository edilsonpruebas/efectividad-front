<div class="app-shell" [class.collapsed]="!sidebarOpen">

  <aside class="sidebar">

    <div class="sidebar-header">
      <span class="logo" *ngIf="sidebarOpen">⚙️ Módulo Efectividad</span>
      <button class="toggle-btn" (click)="toggle()">
        {{ sidebarOpen ? '◀' : '▶' }}
      </button>
    </div>

    <nav class="sidebar-nav">

      <ng-container *ngFor="let group of visibleGroups">

        <div class="nav-section">
          <span class="nav-section-label" *ngIf="sidebarOpen">{{ group.group }}</span>

          <a *ngFor="let item of group.items"
             [routerLink]="item.route"
             routerLinkActive="active"
             [routerLinkActiveOptions]="item.route === '/' ? { exact: true } : {}"
             class="nav-item">
            <span class="nav-icon">{{ item.label.split(' ')[0] }}</span>
            <span class="nav-label" *ngIf="sidebarOpen">{{ item.label.split(' ').slice(1).join(' ') }}</span>
          </a>

        </div>

      </ng-container>

    </nav>

    <!-- FOOTER con usuario y logout -->
    <div class="sidebar-footer" *ngIf="sidebarOpen">
      <span class="sidebar-user">{{ auth.getUser()?.name }}</span>
      <span class="sidebar-role">{{ auth.getUser()?.role }}</span>
      <button class="btn-logout" (click)="logout()">Cerrar sesión</button>
    </div>

  </aside>

  <main class="main-content">
    <router-outlet />
  </main>

</div>
